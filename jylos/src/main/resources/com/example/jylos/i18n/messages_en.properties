dialog.documentation.content=Jylos is a local-first notes app (SQLite or Markdown vault).\n\nFeatures:\n- Folders, tags, favorites, trash\n- Markdown preview (GFM, KaTeX, emoji)\n- Obsidian-style [[wiki-links]] and backlinks\n- Knowledge graph (Ctrl+G): global/local view\n- Full-text search, command palette (Ctrl+P), quick switcher (Ctrl+O)\n- Plugins and external themes\n- Vault mode: Git bar, PDF/image viewers\n\nShortcuts:\n- Ctrl+N: New note  |  Ctrl+S: Save  |  Ctrl+F: Find\n- Ctrl+G: Graph  |  Ctrl+P: Command palette\n\nSee README.md in the repository for full documentation.
