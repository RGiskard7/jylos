dialog.documentation.header=Guía de Usuario de Jylos
dialog.documentation.content=Jylos es una app de notas local-first (SQLite o bóveda Markdown).\n\nCaracterísticas:\n- Carpetas, etiquetas, favoritos, papelera\n- Vista previa Markdown (GFM, KaTeX, emoji)\n- [[wiki-links]] estilo Obsidian y backlinks\n- Grafo de conocimiento (Ctrl+G): vista global/local\n- Búsqueda full-text, paleta de comandos (Ctrl+P), conmutador rápido (Ctrl+O)\n- Plugins y temas externos\n- Modo bóveda: barra Git, visores PDF/imagen\n\nAtajos:\n- Ctrl+N: Nueva nota  |  Ctrl+S: Guardar  |  Ctrl+F: Buscar\n- Ctrl+G: Grafo  |  Ctrl+P: Paleta de comandos\n\nDocumentación completa en README.md del repositorio.
