# External theme descriptor — copy this folder, rename it and edit these values.
# id must be unique; it is what gets stored in preferences when selected.
id=my-theme
name=My Theme
css=theme.css
# darkLike=true  → dark Markdown preview + dark-aware dialogs.
darkLike=false
# base=dark|light|system|auto — stack built-in theme.css under yours (recommended).
# base=auto
