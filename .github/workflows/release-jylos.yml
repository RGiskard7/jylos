name: Release Jylos

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-14-arm64]

    steps:
      - name: Validate semantic tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must look like v1.2.3. Got: $tag" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: echo "JYLOS_RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set Maven project version from tag
        run: >
          mvn -B -f jylos/pom.xml
          versions:set
          -DnewVersion="${{ env.JYLOS_RELEASE_VERSION }}"
          -DgenerateBackupPoms=false

      - name: Run tests
        run: mvn -B -f jylos/pom.xml -Drelease.version="${{ env.JYLOS_RELEASE_VERSION }}" test

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Set up Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-packaging-windows.ps1

      - name: Package Windows EXE
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows-exe.ps1
          New-Item -ItemType Directory -Force -Path dist-assets | Out-Null
          Get-ChildItem jylos\target\installers -Filter '*.exe' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 |
            Copy-Item -Destination dist-assets\jylos-windows-x64.exe -Force

      - name: Package Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows-msi.ps1
          New-Item -ItemType Directory -Force -Path dist-assets | Out-Null
          Get-ChildItem jylos\target\installers -Filter '*.msi' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 |
            Copy-Item -Destination dist-assets\jylos-windows-x64.msi -Force

      - name: Package Windows portable ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Type portable
          New-Item -ItemType Directory -Force -Path dist-assets | Out-Null
          Compress-Archive -Path .\jylos\target\installers\Jylos\* -DestinationPath .\dist-assets\jylos-windows-portable.zip -Force

      - name: Package Linux DEB
        if: runner.os == 'Linux'
        env:
          JYLOS_LINUX_PACKAGE_TYPE: deb
        run: |
          ./scripts/package-linux.sh
          mkdir -p dist-assets
          deb="$(find jylos/target/installers -maxdepth 1 -type f -name '*.deb' | sort | tail -n1)"
          test -n "$deb"
          cp "$deb" dist-assets/jylos-linux-amd64.deb

      - name: Package Linux RPM
        if: runner.os == 'Linux'
        env:
          JYLOS_LINUX_PACKAGE_TYPE: rpm
        run: |
          ./scripts/package-linux.sh
          mkdir -p dist-assets
          rpm="$(find jylos/target/installers -maxdepth 1 -type f -name '*.rpm' | sort | tail -n1)"
          test -n "$rpm"
          cp "$rpm" dist-assets/jylos-linux-amd64.rpm

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: |
          ./scripts/package-macos.sh
          mkdir -p dist-assets
          dmg="$(find jylos/target/installers -maxdepth 1 -type f -name '*.dmg' | sort | tail -n1)"
          test -n "$dmg"
          cp "$dmg" dist-assets/jylos-macos-arm64.dmg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ runner.os }}
          path: dist-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
            END { if (!found) exit 2 }
          ' changelog.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for ${version}." >&2
            echo "Add: ## [${version}] - YYYY-MM-DD" >&2
            exit 1
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "Verify downloads with \`SHA256SUMS.txt\`."
            echo ""
            echo "Windows and macOS packages are currently unsigned."
          } >> release-notes.md

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Jylos ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
